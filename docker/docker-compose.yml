version: '3'

services:
    miao-aiflow-postgresql:
        image: postgres:18
        container_name: miao-aiflow-postgresql
        ports:
            - '5433:5432'
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_DB=postgres
            # - POSTGRESQL_USERNAME=MiaoSong
            - POSTGRES_PASSWORD=xiaoer
            # - POSTGRESQL_DATABASE=postgres
        volumes:
            - ./postgresql_data:/var/lib/postgresql
        # 日志控制，很重要防止服务器被日志文件爆满
        logging:
            driver: 'json-file'
            options:
                max-size: '100m'
                max-file: '3'

    # Qdrant 向量数据库
    miao-aiflow-qdrant:
        image: qdrant/qdrant:latest
        container_name: miao-aiflow-qdrant
        ports:
            - '6333:6333' # REST API
            - '6334:6334' # gRPC
        volumes:
            - ./qdrant_storage:/qdrant/storage
        logging:
            driver: 'json-file'
            options:
                max-size: '100m'
                max-file: '3'

networks:
    default:
        name: miao-aiflow-network
        driver: bridge
